<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:40px;
    }

    .contact-container{

      max-width:800px;

      margin:auto;

      background:#111827;

      padding:50px;

      border-radius:20px;

      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    h1{

      text-align:center;

      color:#60a5fa;

      margin-bottom:40px;

      font-size:48px;
    }

    .contact-info{

      display:flex;

      flex-direction:column;

      gap:25px;
    }

    .contact-card{

      background:#1f2937;

      padding:25px;

      border-radius:15px;

      transition:0.3s;
    }

    .contact-card:hover{

      transform:translateY(-5px);

      box-shadow:0 10px 25px rgba(37,99,235,0.25);
    }

    .contact-card h2{

      color:#60a5fa;

      margin-bottom:12px;
    }

    .contact-card p{

      color:#d1d5db;

      font-size:18px;

      line-height:1.8;
    }

    .contact-card a{

      color:#93c5fd;

      text-decoration:none;
    }

    .contact-card a:hover{

      text-decoration:underline;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .contact-container{
        padding:30px;
      }

      h1{
        font-size:36px;
      }

    }

  </style>

</head>

<body>

  <div class="contact-container">

    <h1>Contact Me</h1>

    <div class="contact-info">

      <div class="contact-card">

        <h2>Email</h2>

        <p>
          anirudhdileep810@gmail.com
        </p>

      </div>

      <div class="contact-card">

        <h2>Phone</h2>

        <p>
          +91 9876543210
        </p>

      </div>

      <div class="contact-card">

        <h2>GitHub</h2>

        <p>
          <a href="https://github.com/anirudhdlp" target="_blank">
            github.com/anirudh
          </a>
        </p>

      </div>

      <div class="contact-card">

        <h2>LinkedIn</h2>

        <p>
          <a href="https://www.linkedin.com/in/anirudh-dileep-486566369/" target="_blank">
            linkedin.com/in/anirudhdlp
          </a>
        </p>

      </div>

    </div>

  </div>

</body>

</html>
