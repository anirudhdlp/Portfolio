<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Certificates</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:40px;
    }

    h1{

      text-align:center;

      margin-bottom:50px;

      color:#60a5fa;

      font-size:48px;
    }

    .certificate-container{

      max-width:1100px;

      margin:auto;

      display:grid;

      grid-template-columns:repeat(auto-fit, minmax(320px,1fr));

      gap:30px;
    }

    .certificate-card{

      background:#111827;

      padding:30px;

      border-radius:18px;

      box-shadow:0 10px 25px rgba(0,0,0,0.35);

      transition:0.3s;
    }

    .certificate-card:hover{

      transform:translateY(-8px);

      box-shadow:0 15px 35px rgba(37,99,235,0.3);
    }

    .certificate-card h2{

      color:#60a5fa;

      margin-bottom:18px;

      font-size:28px;
    }

    .certificate-card p{

      color:#d1d5db;

      line-height:1.8;

      margin-bottom:15px;

      font-size:17px;
    }

    .certificate-card a{

      display:inline-block;

      text-decoration:none;

      background:#2563eb;

      color:white;

      padding:12px 22px;

      border-radius:8px;

      transition:0.3s;
    }

    .certificate-card a:hover{

      background:#1d4ed8;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      h1{
        font-size:36px;
      }

    }

  </style>

</head>

<body>

  <h1>My Certificates</h1>

  <div class="certificate-container">

    <div class="certificate-card">

      <h2>Workshop</h2>

      <p>
        Completed Web Development course
        covering HTML, CSS, JavaScript and courses on Cybersecurity
      </p>

      <p>
        Issued By: w3 schools and techbyheart
      </p>

    </div>

    <div class="certificate-card">

      <h2>Petra Internship</h2>

      <p>
        Successfully completed one month internship.
      </p>

      <p>
        Issued By: Petra
      </p>

      

    </div>

  </div>

</body>

</html>
