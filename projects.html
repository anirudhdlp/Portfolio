<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Projects</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#60a5fa;
    }

    .project-container{

      max-width:1000px;

      margin:auto;

      display:grid;

      gap:30px;
    }

    .project-card{

      background:#111827;

      padding:30px;

      border-radius:15px;

      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .project-card h2{

      color:#60a5fa;

      margin-bottom:15px;
    }

    .project-card p{

      color:#d1d5db;

      line-height:1.8;

      margin-bottom:20px;
    }

    .buttons{

      display:flex;

      gap:15px;
    }

    .buttons a{

      text-decoration:none;

      background:#2563eb;

      color:white;

      padding:12px 20px;

      border-radius:8px;

      transition:0.3s;
    }

    .buttons a:hover{

      background:#1d4ed8;
    }

  </style>

</head>

<body>

  <h1>My Projects</h1>

  <div class="project-container">

    <div class="project-card">

      <h2>Portfolio Website</h2>

      <p>
        Personal portfolio website created using HTML and CSS.
      </p>

      <div class="buttons">

        <a href="https://your-live-link.com" target="_blank">
          Live Demo
        </a>

        <a href="https://github.com/username/portfolio" target="_blank">
          Source Code
        </a>

      </div>

    </div>

    <div class="project-card">

      <h2>Weather App</h2>

      <p>
        Simple weather app using html,css and javascript
      </p>

      <div class="buttons">

        <a href="https://your-live-link.com" target="_blank">
          Live Demo
        </a>

        <a href="https://github.com/username/calculator" target="_blank">
          Source Code
        </a>

      </div>

    </div>

  </div>

</body>

</html>
